# Honcho Configuration — Autarch.OS Minimal Setup
# Session storage + retrieval active. Deriver/Dream/Summary off.
# Provider: NousResearch Inference API (OpenAI-compatible via vllm)

[app]
LOG_LEVEL = "INFO"
SESSION_OBSERVERS_LIMIT = 10
GET_CONTEXT_MAX_TOKENS = 100000
MAX_FILE_SIZE = 5242880
MAX_MESSAGE_SIZE = 25000
EMBED_MESSAGES = false
NAMESPACE = "autarch"

[db]
CONNECTION_URI = "postgresql+psycopg://postgres:postgres@database:5432/postgres"
SCHEMA = "public"
POOL_PRE_PING = true
POOL_SIZE = 5
MAX_OVERFLOW = 10

[auth]
USE_AUTH = false

[sentry]
ENABLED = false

[llm]
DEFAULT_MAX_TOKENS = 2500
EMBEDDING_PROVIDER = "openai"
# NousResearch as vLLM-compatible provider
VLLM_API_KEY = "sk-rdjvlv0dslnejd5xs2ak"
VLLM_BASE_URL = "https://inference-api.nousresearch.com/v1"

[deriver]
ENABLED = false
PROVIDER = "vllm"
MODEL = "nousresearch/hermes-4-405b"
WORKERS = 1

[peer_card]
ENABLED = false

[dialectic]
MAX_OUTPUT_TOKENS = 8192
MAX_INPUT_TOKENS = 100000
HISTORY_TOKEN_LIMIT = 8192
SESSION_HISTORY_MAX_TOKENS = 4096

# All dialectic levels use NousResearch via vllm provider
[dialectic.levels.minimal]
PROVIDER = "vllm"
MODEL = "nousresearch/hermes-4-405b"
THINKING_BUDGET_TOKENS = 0
MAX_TOOL_ITERATIONS = 1
MAX_OUTPUT_TOKENS = 250

[dialectic.levels.low]
PROVIDER = "vllm"
MODEL = "nousresearch/hermes-4-405b"
THINKING_BUDGET_TOKENS = 0
MAX_TOOL_ITERATIONS = 5

[dialectic.levels.medium]
PROVIDER = "vllm"
MODEL = "nousresearch/hermes-4-405b"
THINKING_BUDGET_TOKENS = 0
MAX_TOOL_ITERATIONS = 2

[dialectic.levels.high]
PROVIDER = "vllm"
MODEL = "nousresearch/hermes-4-405b"
THINKING_BUDGET_TOKENS = 0
MAX_TOOL_ITERATIONS = 4

[dialectic.levels.max]
PROVIDER = "vllm"
MODEL = "nousresearch/hermes-4-405b"
THINKING_BUDGET_TOKENS = 0
MAX_TOOL_ITERATIONS = 10

[summary]
ENABLED = false
PROVIDER = "vllm"
MODEL = "nousresearch/hermes-4-405b"

[dream]
ENABLED = false

[webhook]
SECRET = ""
MAX_WORKSPACE_LIMIT = 10

[metrics]
ENABLED = false

[telemetry]
ENABLED = false

[cache]
ENABLED = true
URL = "redis://redis:6379/0?suppress=true"

[vector_store]
TYPE = "pgvector"
MIGRATED = false
NAMESPACE = "autarch"
DIMENSIONS = 1536
