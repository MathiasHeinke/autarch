# Hermes Agent Configuration — Autarch Cloud Worker v0.7.0
# This file is loaded by hermes_cli.config.load_config()
# and provides the mcp_servers block that the agent uses to
# discover and connect to external MCP tool servers.

# Model config (mirrored from hermes.json for hermes_cli)
model: gemini-3.1-pro-preview
provider: google
api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"

# MCP Server Configuration — Apify hosted Streamable HTTP endpoint
# Uses Bearer token authentication via APIFY_API_KEY env var
mcp_servers:
  apify:
    url: "https://mcp.apify.com/sse?tools=actors,docs,apify/rag-web-browser,apify/ai-web-scraper,apify/website-content-crawler,apify/puppeteer-scraper,apify/instagram-scraper,apify/facebook-groups-scraper,apify/google-trends-scraper,api-ninja/x-twitter-advanced-search,api-ninja/youtube-comments-scraper,delicious_zebu/ultimate-x-twitter-advanced-search-scraper,xmiso_scrapers/millions-us-businesses-leads-with-emails-from-google-maps,dev_fusion/Linkedin-Profile-Scraper,clockworks/tiktok-scraper,clockworks/free-tiktok-scraper,streamers/youtube-scraper,streamers/youtube-comments-scraper,topaz_sharingan/Youtube-Transcript-Scraper-1,curious_coder/facebook-ads-library-scraper,apidojo/twitter-scraper-lite,trudax/reddit-scraper-lite,data_xplorer/google-news-scraper-fast"
    headers:
      Authorization: "Bearer ${APIFY_API_KEY}"
    timeout: 180
    connect_timeout: 60
