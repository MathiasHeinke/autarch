steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/paperclip-server:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/paperclip-server:latest'
      - '.'
    timeout: '1200s'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/paperclip-server:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/paperclip-server:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'paperclip-server'
      - '--image=gcr.io/$PROJECT_ID/paperclip-server:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3100'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300'
      - '--set-env-vars=SERVE_UI=true,PAPERCLIP_DEPLOYMENT_MODE=local_trusted,PAPERCLIP_DEPLOYMENT_EXPOSURE=private,PAPERCLIP_MIGRATION_AUTO_APPLY=true,HOST=0.0.0.0,PORT=3100'
      - '--set-secrets=DATABASE_URL=paperclip-database-url:latest,BETTER_AUTH_SECRET=paperclip-auth-secret:latest,HERMES_CLOUD_WORKER_URL=hermes-cloud-worker-url:latest,HERMES_CLOUD_SECRET=hermes-cloud-secret:latest'

images:
  - 'gcr.io/$PROJECT_ID/paperclip-server:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/paperclip-server:latest'

timeout: '1800s'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
